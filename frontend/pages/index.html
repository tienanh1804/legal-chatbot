<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal RAG Chatbot</title>
  <link rel="icon" type="image/png" href="/assets/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/chatgpt.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand-row">
        <div class="brand-title">
          <img class="logo" src="/assets/icon.png" alt="Legal Chatbot">
          <div class="name">Hệ thống AI hỏi đáp pháp luật</div>
        </div>
      </div>

      <div class="sidebar-header">
        <button id="new-chat-btn" class="new-chat-btn" type="button">+ New Chat</button>
        <div class="search">
          <input id="chat-search" type="text" placeholder="Tìm chat theo tiêu đề..." autocomplete="off">
        </div>
      </div>

      <div class="chat-list" id="convo-list"></div>

      <div class="sidebar-bottom">
        <div class="sidebar-suggestions" id="sidebar-suggestions">
          <div class="sidebar-suggestions-title">Gợi ý</div>
          <div class="sidebar-suggestions-list">
            <button type="button" class="suggestion-mini suggestion-btn" title="Gợi ý" data-suggestion="1">
              Người lao động nghỉ việc phải báo trước bao lâu?
            </button>
            <button type="button" class="suggestion-mini suggestion-btn" title="Gợi ý" data-suggestion="2">
              Vượt đèn đỏ bị phạt bao nhiêu?
            </button>
            <button type="button" class="suggestion-mini suggestion-btn" title="Gợi ý" data-suggestion="3">
              Thủ tục ly hôn đơn phương gồm những gì?
            </button>
          </div>
        </div>

        <div class="bottom-row">
          <div class="account-area">
            <button type="button" id="account-toggle-btn" class="account-toggle-btn">
              <span class="account-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M20 21C20 16.5817 16.4183 13 12 13C7.58172 13 4 16.5817 4 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M12 11C14.2091 11 16 9.20914 16 7C16 4.79086 14.2091 3 12 3C9.79086 3 8 4.79086 8 7C8 9.20914 9.79086 11 12 11Z" stroke="currentColor" stroke-width="2"/>
                </svg>
              </span>
              <span id="account-toggle-name">Tài khoản</span>
            </button>

            <div id="account-dropdown" class="account-dropdown d-none">
              <div class="account-dropdown-section" id="login-state">Chưa đăng nhập</div>
              <a class="dropdown-link d-none" href="/login.html" id="login-link">Đăng nhập</a>
              <a class="dropdown-link d-none" href="/register.html" id="register-link">Đăng ký</a>
              <button class="dropdown-link danger-btn d-none" id="delete-account-btn" type="button">
                Xóa tài khoản
              </button>
              <button class="dropdown-link d-none" id="logout-btn" type="button">
                Đăng xuất
              </button>
            </div>
          </div>

          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme"></button>
        </div>
      </div>
    </aside>

    <div class="main">
      <div class="topbar">
        <div style="display:flex; align-items:center; gap:10px;">
          <button id="mobile-sidebar-toggle" class="mobile-sidebar-toggle icon-btn" type="button" title="Menu">☰</button>
        </div>

        <div class="top-actions"></div>
      </div>

      <div class="chat-header">
        <div class="conversation-title" id="conversation-title">Cuộc trò chuyện mới</div>
      </div>

      <div class="messages" id="messages"></div>

      <div class="typing-indicator d-none" id="typing-indicator">
        <span>AI đang trả lời</span>
        <span class="dots"><span></span><span></span><span></span></span>
      </div>

      <div class="composer-stack">
        <div class="composer composer-gemini">
          <input type="file" id="file-input" class="d-none" accept=".pdf,.doc,.docx,application/pdf">
          <button type="button" id="upload-btn" class="upload-btn upload-btn-gemini" title="Đính kèm tài liệu (chỉ trả lời trong phạm vi file)">+</button>
          <textarea
            id="composer"
            placeholder="Nhập câu hỏi... (Enter để gửi, Shift+Enter xuống dòng)"
          ></textarea>
          <button type="button" id="send-btn" class="send-btn" title="Gửi">➤</button>
        </div>
      </div>
    </div>
  </div>

  <div id="doc-preview-modal" class="doc-preview-modal d-none" role="dialog" aria-modal="true">
    <div class="doc-preview-backdrop" id="doc-preview-backdrop"></div>
    <div class="doc-preview-panel">
      <div class="doc-preview-toolbar">
        <span id="doc-preview-title" class="doc-preview-title-text">Xem tài liệu</span>
        <button type="button" id="doc-preview-close" class="doc-preview-close" aria-label="Đóng">×</button>
      </div>
      <iframe id="doc-preview-iframe" class="doc-preview-iframe" title="Xem trước tài liệu"></iframe>
      <div id="doc-preview-fallback" class="doc-preview-fallback d-none"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/chatgpt.js"></script>
</body>
</html>
