<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Hỗ trợ hỏi đáp pháp luật</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Hệ thống AI hỗ trợ hỏi đáp pháp luật</a>
      <div class="d-flex gap-2">
        <a href="login.html" class="btn btn-outline-light btn-sm">Đăng nhập</a>
        <a href="register.html" class="btn btn-light btn-sm">Đăng ký</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-4">
      <div class="col-lg-3">
        <div class="card shadow-sm border-0 h-100">
          <div class="card-body">
            <h5 class="fw-bold">Lịch sử hội thoại</h5>
            

            <div class="list-group history-list mb-4" id="history-list">
              <button class="list-group-item list-group-item-action active">Cuộc trò chuyện hiện tại</button>
              <button class="list-group-item list-group-item-action">Vi phạm giao thông</button>
              <button class="list-group-item list-group-item-action">Chấm dứt hợp đồng lao động</button>
              <button class="list-group-item list-group-item-action">Ly hôn đơn phương</button>
            </div>

            <div class="demo-box">
              <h6 class="fw-bold">Câu hỏi gợi ý</h6>
              <div class="d-grid gap-2">
                <button class="btn btn-outline-primary btn-sm suggestion-btn">Vượt đèn đỏ bị phạt bao nhiêu?</button>
                <button class="btn btn-outline-primary btn-sm suggestion-btn">Người lao động nghỉ việc phải báo trước bao lâu?</button>
                <button class="btn btn-outline-primary btn-sm suggestion-btn">Thủ tục ly hôn đơn phương gồm những gì?</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-9">
        <div class="card shadow-sm border-0">
          <div class="card-body p-0">
<div class="chat-box p-4" id="chat-box">
              <div class="message ai-message">
                <div class="message-role">Trợ lý AI</div>
                <div class="message-content">
                  Xin chào. Tôi có thể hỗ trợ bạn tra cứu thông tin pháp luật. Bạn hãy nhập câu hỏi ở ô phía dưới.
                </div>
              </div>
            </div>

            <div class="px-4">
              <div class="alert alert-info d-none py-2" id="typing-indicator">
                Hệ thống đang tra cứu văn bản pháp luật...
              </div>
            </div>

            <div class="input-panel p-4 border-top">
              <form id="chat-form">
                <div class="input-group">
                  <input
                    type="text"
                    id="question-input"
                    class="form-control form-control-lg"
                    placeholder="Ví dụ: Người lao động nghỉ việc có cần báo trước không?"
                    autocomplete="off"
                  >
                  <button class="btn btn-primary px-4" type="submit">Gửi</button>
                </div>
              </form>
              
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
