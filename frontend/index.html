<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link rel="icon" type="image/png" href="assets/icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark app-navbar sticky-top shadow-sm">
    <div class="container align-items-center">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-3" href="index.html">
        <img src="assets/icon.png" alt="Legal Chatbot" class="brand-icon">
        <span>Hệ thống AI hỗ trợ hỏi đáp pháp luật</span>
      </a>
      <div class="d-flex gap-2 align-items-center ms-auto">
        <span class="login-state text-white-50 small d-none d-lg-inline" id="login-state">Chưa đăng nhập</span>
        <a href="login.html" class="btn btn-outline-light btn-sm" id="login-link">Đăng nhập</a>
        <a href="register.html" class="btn btn-light btn-sm" id="register-link">Đăng ký</a>
        <button class="btn btn-light btn-sm d-none" id="logout-btn" type="button">Đăng xuất</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-4">
      <div class="col-lg-3">
        <div class="card shadow-sm border-0 app-card h-100">
          <div class="card-body">
            <div class="d-flex align-items-center justify-content-between mb-3 gap-2">
              <h5 class="fw-bold mb-0">Lịch sử hội thoại</h5>
              <button class="btn btn-primary btn-sm" id="new-chat-btn" type="button">+ Cuộc trò chuyện mới</button>
            </div>

            <div class="list-group history-list mb-4" id="history-list"></div>

            <div class="demo-box mb-3">
              <h6 class="fw-bold">Câu hỏi gợi ý</h6>
              <div class="d-grid gap-2">
                <button class="btn btn-outline-primary btn-sm suggestion-btn">Vượt đèn đỏ bị phạt bao nhiêu?</button>
                <button class="btn btn-outline-primary btn-sm suggestion-btn">Người lao động nghỉ việc phải báo trước bao lâu?</button>
                <button class="btn btn-outline-primary btn-sm suggestion-btn">Thủ tục ly hôn đơn phương gồm những gì?</button>
              </div>
            </div>

          </div>
        </div>
      </div>

      <div class="col-lg-9">
        <div class="card shadow-sm border-0 app-card">
          <div class="card-body p-0">
            <div class="chat-topbar px-4 py-3 border-bottom d-flex align-items-center justify-content-between">
              <div>
                <div class="fw-semibold" id="chat-session-title">Phiên hỏi đáp pháp luật</div>
              </div>
            </div>

            <div class="chat-box p-4" id="chat-box">
              <div class="message ai-message">
                <div class="message-role">Trợ lý AI</div>
                <div class="message-content">
                  Xin chào. Tôi có thể hỗ trợ bạn tra cứu thông tin pháp luật. Bạn hãy nhập câu hỏi ở ô phía dưới.
                </div>
              </div>
            </div>

            <div class="px-4">
              <div class="alert alert-info d-none py-2" id="typing-indicator">
                Hệ thống đang tra cứu văn bản pháp luật...
              </div>
            </div>

            <div class="input-panel p-4 border-top">
              <form id="chat-form">
                <div class="input-group input-group-lg">
                  <input
                    type="text"
                    id="question-input"
                    class="form-control"
                    placeholder="Ví dụ: Người lao động nghỉ việc có cần báo trước không?"
                    autocomplete="off"
                  >
                  <button class="btn btn-primary px-4" id="send-btn" type="submit">Gửi</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
